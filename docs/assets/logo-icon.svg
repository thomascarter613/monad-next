<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 512 512"
  role="img"
  aria-labelledby="monad-icon-title monad-icon-desc"
>
  <title id="monad-icon-title">Monad icon</title>
  <desc id="monad-icon-desc">
    A stylized M-shaped network icon representing orchestration, repository structure,
    policy, and connected execution flows.
  </desc>

  <defs>
    <style>
      :root {
        --monad-bg: #0f1117;
        --monad-indigo: #6258f5;
        --monad-indigo-soft: #7d8cf7;
        --monad-cream: #f2eee8;
        --monad-shadow: rgba(98, 88, 245, 0.28);
      }
    </style>

    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="var(--monad-shadow)" />
    </filter>
  </defs>

  <!-- Dark preview background. Remove this rect for a transparent icon. -->
  <rect width="512" height="512" rx="40" fill="var(--monad-bg)" />

  <g filter="url(#soft-glow)">
    <!-- Main outer monoline M/network path. -->
    <path
      d="M128 384 V128 L256 262 L384 128 V384"
      fill="none"
      stroke="var(--monad-indigo)"
      stroke-width="38"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Inner secondary M channels. -->
    <path
      d="M176 332 V224 L238 288"
      fill="none"
      stroke="var(--monad-indigo-soft)"
      stroke-width="28"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.78"
    />

    <path
      d="M336 332 V224 L274 288"
      fill="none"
      stroke="var(--monad-indigo-soft)"
      stroke-width="28"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.78"
    />

    <!-- Cream lower outbox / event-flow connector. -->
    <path
      d="M148 384 H364"
      fill="none"
      stroke="var(--monad-cream)"
      stroke-width="22"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M256 304 V384"
      fill="none"
      stroke="var(--monad-cream)"
      stroke-width="22"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Top-left node. -->
    <circle cx="128" cy="128" r="44" fill="var(--monad-indigo)" />
    <circle cx="128" cy="128" r="24" fill="var(--monad-cream)" />
    <circle cx="128" cy="128" r="14" fill="var(--monad-bg)" />

    <!-- Top-right node. -->
    <circle cx="384" cy="128" r="44" fill="var(--monad-indigo)" />
    <circle cx="384" cy="128" r="24" fill="var(--monad-cream)" />
    <circle cx="384" cy="128" r="14" fill="var(--monad-bg)" />

    <!-- Center orchestration node. -->
    <circle cx="256" cy="262" r="42" fill="var(--monad-indigo)" />
    <circle cx="256" cy="262" r="21" fill="var(--monad-bg)" />

    <!-- Bottom-left node. -->
    <circle cx="128" cy="384" r="43" fill="var(--monad-indigo)" />
    <circle cx="128" cy="384" r="20" fill="var(--monad-bg)" />

    <!-- Bottom-right node. -->
    <circle cx="384" cy="384" r="43" fill="var(--monad-indigo)" />
    <circle cx="384" cy="384" r="20" fill="var(--monad-bg)" />

    <!-- Bottom-center event/outbox node. -->
    <circle cx="256" cy="384" r="44" fill="var(--monad-cream)" />
    <circle cx="256" cy="384" r="18" fill="var(--monad-bg)" />
  </g>
</svg>